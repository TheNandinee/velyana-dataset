name: Build Velyana Dataset
# Uses the committed output/synthetic_prompts.csv (generated separately in Colab).
# download real data -> map to taxonomy -> cosine filter + merge synthetic -> final CSV.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas scikit-learn sentence-transformers tqdm pyarrow requests
      - name: Create directories
        run: mkdir -p downloaded output
      - name: Check synthetic file is present
        run: |
          if [ -f output/synthetic_prompts.csv ]; then
            echo "OK: output/synthetic_prompts.csv found ($(wc -l < output/synthetic_prompts.csv) lines)"
          else
            echo "WARNING: output/synthetic_prompts.csv NOT found - the 14 synthetic vectors will show N/A"
          fi
      - name: 1) Download real datasets
        run: python scripts/01_download_hf.py
      - name: 2) Build + map to taxonomy
        run: python scripts/02_build_datasets.py
      - name: 3) Cosine filter + merge synthetic + coverage
        run: python scripts/03_cosine_filter.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velyana-dataset
          path: output/*.csv
          retention-days: 30
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add output/*.csv
          git diff --cached --quiet || git commit -m "Dataset build $(date)"
          git push origin main
        continue-on-error: true
