name: Build Velyana Dataset

on:
  workflow_dispatch:  # Click "Run workflow" button on GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install datasets huggingface_hub pandas scikit-learn sentence-transformers tqdm pyarrow
    
    - name: Login to HuggingFace
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        huggingface-cli login --token $HF_TOKEN --add_to_git_credential
    
    - name: Download HuggingFace datasets
      run: python scripts/01_download_hf.py
    
    - name: Build attack & benign datasets
      run: python scripts/02_build_datasets_APPEND.py
    
    - name: Apply cosine filter
      run: python scripts/03_cosine_filter.py
    
    - name: Upload final CSVs
      uses: actions/upload-artifact@v3
      with:
        name: final-datasets
        path: output/*.csv
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/*.csv
        git commit -m "✅ Dataset build complete" || echo "No changes to commit"
        git push