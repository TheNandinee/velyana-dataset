name: Build Velyana Dataset (fetched + generated)
# One run = full final CSV: download real data -> map to taxonomy -> generate synthetic
# (Llama 3.2) for the N/A vectors -> cosine filter + merge -> output/velyana_dataset_final.csv
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350           # generation on CPU is slow; give it room
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      GEN_MODEL: unsloth/Llama-3.2-1B-Instruct   # ungated + CPU-friendly. For 3B quality, generate in Colab instead.
      PER_VECTOR: "100"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas scikit-learn sentence-transformers tqdm pyarrow requests transformers accelerate torch
      - name: Create directories
        run: mkdir -p downloaded output
      - name: 1) Download real datasets
        run: python scripts/01_download_hf.py
      - name: 2) Build + map to taxonomy
        run: python scripts/02_build_datasets.py
      - name: 3) Generate synthetic for N/A vectors (Llama 3.2)
        run: python scripts/04_generate_synthetic.py
      - name: 4) Cosine filter + merge + coverage
        run: python scripts/03_cosine_filter.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velyana-dataset
          path: output/*.csv
          retention-days: 30
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add output/*.csv
          git diff --cached --quiet || git commit -m "Dataset build $(date)"
          git push origin main
        continue-on-error: true
