name: Build Velyana Dataset
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas scikit-learn sentence-transformers tqdm pyarrow requests
      - name: Create directories
        run: mkdir -p downloaded output
      - name: Download datasets
        run: python scripts/01_download_hf.py
      - name: Build datasets (map to taxonomy)
        run: python scripts/02_build_datasets.py
      - name: Cosine filter + coverage report
        run: python scripts/03_cosine_filter.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velyana-dataset
          path: output/*.csv
          retention-days: 30
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add output/*.csv
          git diff --cached --quiet || git commit -m "Dataset build $(date)"
          git push origin main
        continue-on-error: true
